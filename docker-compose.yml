version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: miniapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  bot:
    build: .
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/miniapp
      - REDIS_URL=redis://redis:6379/0
      - ADMIN_IDS=${ADMIN_IDS}
      - PAYMENT_TEXT_RU=${PAYMENT_TEXT_RU}
      - PAYMENT_TEXT_BY=${PAYMENT_TEXT_BY}
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
